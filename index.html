<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регулировка положения платформы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: gray;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 35px;
            font-size: 28px;
        }

        .main {
            display: grid;
            grid-template-columns: 140px 1fr 140px;
            align-items: stretch;
            gap: 70px;
            min-height: 500px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px 10px;
            background: #f8f9fa;
            border-radius: 16px;
            width: 140px;
            position: relative;
        }

        .motor-svg {
            width: 80px;
            height: auto;
            display: block;
            margin: 0 auto 4px auto;
            flex-shrink: 0;
        }

        .motor-svg.flipped {
            transform: scaleX(-1);
        }

        .slider-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
            height: 300px;
            position: relative;
            overflow: visible;
        }

        .slider-container .step-btn-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 1;
        }

        .slider-container.left .step-btn-container {
            margin-right: 8px;
        }

        .slider-container.right .step-btn-container {
            margin-left: auto;
            margin-right: 8px;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            flex-shrink: 0;
        }

        .zero-marker {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: 600;
            color: #888;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 0 4px;
            border-radius: 2px;
            z-index: 1;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            transform: rotate(270deg);
            width: 250px; /* увеличено с 150px до 250px */
            height: 8px;
            background: #ccc;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 16px;
            border-radius: 2px;
            background: #2c3e50;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 28px;
            height: 16px;
            border-radius: 2px;
            background: #2c3e50;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .step-btn {
            width: 32px;
            height: 32px;
            font-size: 16px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            user-select: none;
            color: #2c3e50;
            flex-shrink: 0;
        }

        .step-btn:hover:not(:disabled) {
            background: #e9ecef;
            transform: scale(1.05);
        }

        .step-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .step-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .step-btn.up {
            margin-bottom: 4px;
        }

        .step-btn.down {
            margin-top: 4px;
        }

        .slider-value {
            margin-top: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            background: #fffbe6;
            padding: 4px 14px;
            border-radius: 6px;
            border: 1px solid #ddd;
            display: inline-block;
            min-width: 70px;
            text-align: center;
        }

        .line-area {
            position: relative;
            height: 500px;
            background: #f0f2f5;
            border-radius: 12px;
            overflow: hidden;
        }

        .line-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .line {
            stroke: #2c3e50;
            stroke-width: 6;
            stroke-linecap: round;
            transition: none;
        }

        .endpoint {
            fill: #888888;
            stroke: #666666;
            stroke-width: 2;
        }

        .status-bar {
            margin-top: 16px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            background: #e9ecef;
            color: #495057;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6c757d;
            flex-shrink: 0;
        }
        .status-dot.ok {
            background: #28a745;
        }
        .status-dot.err {
            background: #dc3545;
        }
        .status-dot.wait {
            background: #ffc107;
        }

        .status-label {
            font-weight: 600;
        }
        .status-msg {
            color: #868e96;
        }

        .calib-btn {
            padding: 6px 16px;
            border: 1px solid #667eea;
            border-radius: 4px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 13px;
            transition: 0.15s;
        }
        .calib-btn:hover {
            background: #667eea;
            color: white;
        }
        .calib-btn.home {
            border-color: #28a745;
            color: #28a745;
        }
        .calib-btn.home:hover {
            background: #28a745;
            color: white;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .sync-indicator {
            animation: pulse 1.5s ease-in-out infinite;
            font-weight: 600;
            color: #ffc107;
        }
        .sync-indicator.done {
            animation: none;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Регулировка платформы — установите положение ползунками</h1>

        <div class="main">
            <!-- Левая колонка (ось X) -->
            <div class="controls">
                <svg class="motor-svg" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="10" width="55" height="40" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
                    <rect x="12" y="12" width="51" height="8" fill="#3a3a3a"/>
                    <rect x="12" y="40" width="51" height="8" fill="#3a3a3a"/>
                    <rect x="65" y="25" width="25" height="10" fill="#888888" stroke="#666666" stroke-width="1"/>
                    <rect x="85" y="23" width="8" height="14" fill="#999999" stroke="#777777" stroke-width="1"/>
                    <rect x="8" y="8" width="4" height="6" fill="#1a1a1a"/>
                    <rect x="8" y="46" width="4" height="6" fill="#1a1a1a"/>
                </svg>

                <div class="slider-container left">
                    <div class="step-btn-container">
                        <button class="step-btn up" id="leftUp" title="Вверх на 1 мм">▲</button>
                        <button class="step-btn down" id="leftDown" title="Вниз на 1 мм">▼</button>
                    </div>
                    <div class="slider-wrapper">
                        <input type="range" id="leftSlider" min="0" max="50" value="0" step="1" />
                        <span class="zero-marker">0</span>
                    </div>
                </div>

                <span class="slider-value" id="leftSliderValue">0 мм</span>
            </div>

            <!-- Линия (SVG) -->
            <div class="line-area">
                <svg class="line-svg" id="svg" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
                    <line x1="30" y1="250" x2="570" y2="250" stroke="#bbb" stroke-width="1" stroke-dasharray="6 6" />
                    <line class="line" id="mainLine" x1="30" y1="250" x2="570" y2="250" />
                    <circle class="endpoint" id="leftDot" cx="30" cy="250" r="8" />
                    <circle class="endpoint" id="rightDot" cx="570" cy="250" r="8" />
                </svg>
            </div>

            <!-- Правая колонка (ось Y) -->
            <div class="controls">
                <svg class="motor-svg flipped" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="10" width="55" height="40" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
                    <rect x="12" y="12" width="51" height="8" fill="#3a3a3a"/>
                    <rect x="12" y="40" width="51" height="8" fill="#3a3a3a"/>
                    <rect x="65" y="25" width="25" height="10" fill="#888888" stroke="#666666" stroke-width="1"/>
                    <rect x="85" y="23" width="8" height="14" fill="#999999" stroke="#777777" stroke-width="1"/>
                    <rect x="8" y="8" width="4" height="6" fill="#1a1a1a"/>
                    <rect x="8" y="46" width="4" height="6" fill="#1a1a1a"/>
                </svg>

                <div class="slider-container right">
                    <div class="slider-wrapper">
                        <input type="range" id="rightSlider" min="0" max="50" value="0" step="1" />
                        <span class="zero-marker">0</span>
                    </div>
                    <div class="step-btn-container">
                        <button class="step-btn up" id="rightUp" title="Вверх на 1 мм">▲</button>
                        <button class="step-btn down" id="rightDown" title="Вниз на 1 мм">▼</button>
                    </div>
                </div>

                <span class="slider-value" id="rightSliderValue">0 мм</span>
            </div>
        </div>

        <!-- Статус с кнопками -->
        <div class="status-bar">
            <span class="status-dot wait" id="statusDot"></span>
            <span class="status-label" id="statusLabel">Соединение...</span>
            <span class="status-msg" id="statusMsg">ожидание сервера</span>
            <span class="status-msg sync-indicator" id="syncIndicator" style="display:none;">Синхронизация...</span>
            <button class="calib-btn" id="calibrateBtn">⟳ Калибровка</button>
            <button class="calib-btn home" id="homeBtn">В ноль (0)</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  КОНФИГУРАЦИЯ
        // ============================================================
        const MAX_MM = 50;
        const MIN_MM = 0;
        const PX_PER_CM = 24;
        const BASE_Y = 250;
        const SVG_HEIGHT = 300;
        const SERVER_URL = window.location.origin;

        // ============================================================
        //  СОСТОЯНИЕ
        // ============================================================
        let leftMm = 0;
        let rightMm = 0;
        let isMoving = false;

        // ============================================================
        //  DOM-ЭЛЕМЕНТЫ
        // ============================================================
        const mainLine = document.getElementById('mainLine');
        const leftDot = document.getElementById('leftDot');
        const rightDot = document.getElementById('rightDot');

        const leftSlider = document.getElementById('leftSlider');
        const rightSlider = document.getElementById('rightSlider');
        const leftSliderValue = document.getElementById('leftSliderValue');
        const rightSliderValue = document.getElementById('rightSliderValue');

        const leftUp = document.getElementById('leftUp');
        const leftDown = document.getElementById('leftDown');
        const rightUp = document.getElementById('rightUp');
        const rightDown = document.getElementById('rightDown');

        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const statusMsg = document.getElementById('statusMsg');
        const syncIndicator = document.getElementById('syncIndicator');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const homeBtn = document.getElementById('homeBtn');

        // ============================================================
        //  ОТРИСОВКА
        // ============================================================
        function render() {
            const leftCmVis = leftMm / 10;
            const rightCmVis = rightMm / 10;
            let leftY = BASE_Y - leftCmVis * PX_PER_CM;
            let rightY = BASE_Y - rightCmVis * PX_PER_CM;

            leftY = Math.min(SVG_HEIGHT, Math.max(0, leftY));
            rightY = Math.min(SVG_HEIGHT, Math.max(0, rightY));

            mainLine.setAttribute('y1', leftY);
            mainLine.setAttribute('y2', rightY);
            leftDot.setAttribute('cy', leftY);
            rightDot.setAttribute('cy', rightY);

            leftSliderValue.textContent = Math.round(leftMm) + ' мм';
            rightSliderValue.textContent = Math.round(rightMm) + ' мм';

            if (document.activeElement !== leftSlider) {
                leftSlider.value = leftMm;
            }
            if (document.activeElement !== rightSlider) {
                rightSlider.value = rightMm;
            }

            leftUp.disabled = leftMm >= MAX_MM || isMoving;
            leftDown.disabled = leftMm <= MIN_MM || isMoving;
            rightUp.disabled = rightMm >= MAX_MM || isMoving;
            rightDown.disabled = rightMm <= MIN_MM || isMoving;
        }

        // ============================================================
        //  СТАТУС
        // ============================================================
        function setStatus(state, msg) {
            statusDot.className = 'status-dot';
            if (state === 'ok') {
                statusDot.classList.add('ok');
                statusLabel.textContent = 'Готов';
            } else if (state === 'err') {
                statusDot.classList.add('err');
                statusLabel.textContent = 'Ошибка';
            } else if (state === 'wait') {
                statusDot.classList.add('wait');
                statusLabel.textContent = 'Ожидание...';
            } else {
                statusDot.classList.add('wait');
                statusLabel.textContent = 'Соединение...';
            }
            if (msg) statusMsg.textContent = msg;
        }

        // ============================================================
        //  HTTP
        // ============================================================
        async function apiRequest(endpoint, method = 'POST', body = null) {
            const opts = {
                method: method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(SERVER_URL + endpoint, opts);
            if (!resp.ok) {
                const text = await resp.text();
                throw new Error(`HTTP ${resp.status}: ${text}`);
            }
            return await resp.json();
        }

        // ============================================================
        //  КАЛИБРОВКА (HW)
        // ============================================================
        async function doCalibrate() {
            setStatus('wait', 'Калибровка (HW)...');
            try {
                const result = await apiRequest('/calibrate', 'POST');
                if (result.success) {
                    if (result.position) {
                        leftMm = result.position.x;
                        rightMm = result.position.y;
                    }
                    render();
                    setStatus('ok', 'Калибровка выполнена (HW)');
                } else {
                    setStatus('err', result.error || 'Ошибка калибровки');
                }
            } catch (e) {
                setStatus('err', 'Ошибка: ' + e.message);
            }
        }

        // ============================================================
        //  ЧТЕНИЕ ДОМА (HR)
        // ============================================================
        async function doReadHome() {
            setStatus('wait', 'Чтение домашних координат (HR)...');
            try {
                const result = await apiRequest('/read_home', 'POST');
                if (result.success) {
                    if (result.position) {
                        leftMm = result.position.x;
                        rightMm = result.position.y;
                    }
                    render();
                    setStatus('ok', 'Домашние координаты прочитаны');
                    return true;
                } else {
                    setStatus('err', result.error || 'Ошибка чтения HR');
                    return false;
                }
            } catch (e) {
                setStatus('err', 'Ошибка: ' + e.message);
                return false;
            }
        }

        // ============================================================
        //  ВОЗВРАТ В ДОМ (MH)
        // ============================================================
        async function doGoHome() {
            if (isMoving) return;
            setStatus('wait', 'Перемещение домой (MH)...');
            syncIndicator.style.display = 'inline';
            syncIndicator.textContent = 'Выполняется MH...';
            syncIndicator.className = 'status-msg sync-indicator';
            isMoving = true;
            render();

            try {
                const result = await apiRequest('/go_home', 'POST');
                if (result.success) {
                    if (result.position) {
                        leftMm = result.position.x;
                        rightMm = result.position.y;
                    }
                    render();
                    setStatus('ok', 'Станок вернулся в дом (MH)');
                    syncIndicator.textContent = 'MH выполнен ✓';
                    syncIndicator.className = 'status-msg sync-indicator done';
                    setTimeout(() => {
                        syncIndicator.style.display = 'none';
                    }, 3000);
                } else {
                    setStatus('err', result.error || 'Ошибка MH');
                    syncIndicator.textContent = 'Ошибка MH';
                    syncIndicator.className = 'status-msg sync-indicator';
                }
            } catch (e) {
                setStatus('err', 'Ошибка: ' + e.message);
                syncIndicator.textContent = 'Ошибка MH';
                syncIndicator.className = 'status-msg sync-indicator';
            }

            isMoving = false;
            render();
        }

        // ============================================================
        //  АБСОЛЮТНОЕ ПЕРЕМЕЩЕНИЕ (через RM)
        // ============================================================
        async function doMoveAbsolute(axis, target) {
            if (isMoving) return;
            if (target < MIN_MM || target > MAX_MM) return;

            isMoving = true;
            setStatus('wait', `Движение оси ${axis.toUpperCase()} к ${target} мм...`);
            render();

            try {
                const result = await apiRequest('/move_abs', 'POST', {
                    axis: axis,
                    target_mm: target
                });

                if (result.success) {
                    if (result.position) {
                        if (axis === 'x') {
                            leftMm = result.position.x;
                        } else {
                            rightMm = result.position.y;
                        }
                    }
                    render();
                    setStatus('ok', `Перемещено на ${target} мм`);
                } else {
                    setStatus('err', result.error || 'Ошибка перемещения');
                    if (axis === 'x') {
                        leftSlider.value = leftMm;
                    } else {
                        rightSlider.value = rightMm;
                    }
                    render();
                }
            } catch (e) {
                setStatus('err', 'Ошибка: ' + e.message);
                if (axis === 'x') {
                    leftSlider.value = leftMm;
                } else {
                    rightSlider.value = rightMm;
                }
                render();
            }

            isMoving = false;
            render();
        }

        // ============================================================
        //  ОБРАБОТЧИКИ ШАГОВЫХ КНОПОК
        // ============================================================
        function stepUp(axis) {
            const current = axis === 'x' ? leftMm : rightMm;
            if (current >= MAX_MM) return;
            doMoveAbsolute(axis, current + 1);
        }

        function stepDown(axis) {
            const current = axis === 'x' ? leftMm : rightMm;
            if (current <= MIN_MM) return;
            doMoveAbsolute(axis, current - 1);
        }

        leftUp.addEventListener('click', () => stepUp('x'));
        leftDown.addEventListener('click', () => stepDown('x'));
        rightUp.addEventListener('click', () => stepUp('y'));
        rightDown.addEventListener('click', () => stepDown('y'));

        // ============================================================
        //  ОБРАБОТЧИКИ ПОЛЗУНКОВ
        // ============================================================
        function onSliderInput(axis) {
            const slider = axis === 'x' ? leftSlider : rightSlider;
            const val = parseInt(slider.value, 10);
            if (axis === 'x') {
                leftSliderValue.textContent = val + ' мм';
            } else {
                rightSliderValue.textContent = val + ' мм';
            }

            if (!isMoving) {
                const leftCmVis = (axis === 'x' ? val : leftMm) / 10;
                const rightCmVis = (axis === 'y' ? val : rightMm) / 10;
                let leftY = BASE_Y - leftCmVis * PX_PER_CM;
                let rightY = BASE_Y - rightCmVis * PX_PER_CM;
                leftY = Math.min(SVG_HEIGHT, Math.max(0, leftY));
                rightY = Math.min(SVG_HEIGHT, Math.max(0, rightY));
                mainLine.setAttribute('y1', leftY);
                mainLine.setAttribute('y2', rightY);
                leftDot.setAttribute('cy', leftY);
                rightDot.setAttribute('cy', rightY);
            }
        }

        function onSliderChange(axis) {
            const slider = axis === 'x' ? leftSlider : rightSlider;
            const val = parseInt(slider.value, 10);
            doMoveAbsolute(axis, val);
        }

        leftSlider.addEventListener('input', () => onSliderInput('x'));
        leftSlider.addEventListener('change', () => onSliderChange('x'));

        rightSlider.addEventListener('input', () => onSliderInput('y'));
        rightSlider.addEventListener('change', () => onSliderChange('y'));

        calibrateBtn.addEventListener('click', doCalibrate);
        homeBtn.addEventListener('click', doGoHome);

        // ============================================================
        //  ПИНГ СЕРВЕРА И ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        async function pingServer() {
            try {
                const resp = await fetch(SERVER_URL + '/ping', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                });
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.status === 'ok') {
                        setStatus('ok', 'Сервер доступен');
                        return true;
                    }
                }
                setStatus('err', 'Сервер недоступен');
                return false;
            } catch (e) {
                setStatus('err', 'Сервер не отвечает: ' + e.message);
                return false;
            }
        }

        async function init() {
            const ok = await pingServer();
            if (ok) {
                await doReadHome();
                await doGoHome();
            } else {
                setTimeout(init, 5000);
            }
        }

        render();
        init();

        console.log('✅ Страница загружена. Сервер: ' + SERVER_URL);
        console.log('   Левая сторона → ось X, правая сторона → ось Y');
        console.log('   Используются команды: HW (калибровка), MH (домой), RM (относительное движение)');
    </script>
</body>
</html>
